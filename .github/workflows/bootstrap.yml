name: Bootstrap Android Flutter Project
on: [push, workflow_dispatch]
jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
      - name: Create Flutter Project
        run: |
          find . -maxdepth 1 ! -name '.github' ! -name '.git' ! -name '.' -exec rm -rf {} +
          flutter create --org com.aman.ai --project-name new_4 --platforms android,web .
      - name: Commit and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -d ".git" ]; then
            git init
            git remote add origin https://x-access-token:$GITHUB_TOKEN@github.com/${{ github.repository }}.git
            git checkout -b main
          fi
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Bootstrap via Aman IDE [skip ci]"
            git push origin main --force
          fi
